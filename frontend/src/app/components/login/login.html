<div class="login-container">
  <!-- Glowing Background Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Glassmorphic Login Card -->
  <div class="login-card">
    <div class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>PayrollPro</h2>
      <p>Gestión de Planillas y Recursos Humanos</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <!-- Error Message -->
      <div *ngIf="error()" class="error-badge">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span>{{ error() }}</span>
      </div>

      <!-- User input -->
      <div class="input-group">
        <label for="usuario">Usuario</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <input
            type="text"
            id="usuario"
            name="usuario"
            [ngModel]="usuario()"
            (ngModelChange)="usuario.set($event)"
            placeholder="Introduce tu usuario (e.g. admin)"
            required
            autocomplete="username"
          />
        </div>
      </div>

      <!-- Password input -->
      <div class="input-group">
        <label for="contrasena">Contraseña</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input
            [type]="showPassword() ? 'text' : 'password'"
            id="contrasena"
            name="contrasena"
            [ngModel]="contrasena()"
            (ngModelChange)="contrasena.set($event)"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
          <button type="button" class="btn-toggle-password" (click)="togglePassword()">
            <svg *ngIf="!showPassword()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-eye">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg *ngIf="showPassword()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-eye">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
        </div>
      </div>

      <!-- Action Button -->
      <button type="submit" class="btn-submit" [disabled]="loading()">
        <span *ngIf="!loading()">Iniciar Sesión</span>
        <span *ngIf="loading()" class="spinner"></span>
      </button>

      <!-- Help info -->
      <div class="login-help">
        <p>Credenciales de prueba: <code>admin</code> / <code>admin123</code></p>
      </div>
    </form>
  </div>
</div>
